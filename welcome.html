<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Welcome | SSBS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h3>SSBS</h3>
    <a href="welcome.html">🏠 Μενού</a>
    <a href="dashboard.html">📈 Dashboard</a>
    <a href="inventory.html">📦 Απόθεμα</a>
    <a href="draft-order.html">📦 Παραγγελία</a>
    <a href="review-order.html">📝 Έλεγχος</a>
    <a href="supplier.html">🚚 Τροφοδοσία</a>
    <a href="owner-reports.html">📊 Αναφορές</a>
</div>

<div class="container">

    <img src="assets/galaktopoleio-logo-18a41922.png" class="logo">

    <h1 id="welcomeText"></h1>

    <p class="muted" style="text-align:center; margin:0;">
        Επιλέξτε διαθέσιμη λειτουργία από το μενού
    </p>

    <div class="menu" id="menu"></div>

    <button onclick="logout()" style="max-width:260px;">Αποσύνδεση</button>

</div>

<script>

const user = localStorage.getItem("user");
const role = localStorage.getItem("role");

if(!user || !role){
    window.location.href = "index.html";
}

document.getElementById("welcomeText").innerText = "Καλώς ήρθες, " + user;

const menu = document.getElementById("menu");

if(role === "employee"){
    menu.innerHTML = `
        <a href="draft-order.html">📦 Δημιουργία Παραγγελίας</a>
        <a href="inventory.html">📊 Διαχείριση Αποθέματος</a>
    `;
}

else if(role === "manager"){
    menu.innerHTML = `
        <a href="review-order.html">📝 Έλεγχος Παραγγελίας</a>
        <a href="dashboard.html">📈 Dashboard Καταστήματος</a>
        <a href="inventory.html">📊 Διαχείριση Αποθέματος</a>
    `;
}

else if(role === "supplier"){
    menu.innerHTML = `
        <a href="supplier.html">🚚 Τροφοδοσία Καταστήματος</a>
    `;
}

else if(role === "owner"){
    menu.innerHTML = `
        <a href="owner-reports.html">📊 Αναφορές Καταστημάτων</a>
    `;
}

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
