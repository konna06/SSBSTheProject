<div class="container">

<h2>📦 Δημιουργία Παραγγελίας</h2>

<p class="muted" style="text-align:center;">
Συμπληρώστε προϊόν και ποσότητα
</p>

<input type="text" id="product" placeholder="Όνομα προϊόντος">
<input type="number" id="qty" placeholder="Ποσότητα">

<button onclick="saveOrder()">Αποθήκευση</button>

<a href="welcome.html">← Πίσω</a>

</div>

<script>

if(localStorage.getItem("role") !== "employee"){
    window.location.href = "welcome.html";
}

function saveOrder(){

    const p = document.getElementById("product").value;
    const q = document.getElementById("qty").value;

    if(!p || !q){
        return alert("Συμπλήρωσε όλα τα πεδία");
    }

    alert("Η παραγγελία αποθηκεύτηκε!");
}

</script>

</body>
