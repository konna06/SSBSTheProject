<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Αποθέματα</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h2>SSBS</h2>
    <a href="welcome.html">🏠 Μενού</a>
</div>

<div class="container">

<h2>Διαχείριση Αποθέματος</h2>

<select id="type">
    <option value="">-- Ενέργεια --</option>
    <option value="sale">Πώληση</option>
    <option value="purchase">Αγορά</option>
    <option value="damage">Φθορά</option>
    <option value="return">Επιστροφή</option>
</select>

<select id="mode" onchange="toggleMode()">
    <option value="">-- Τρόπος εισαγωγής --</option>
    <option value="manual">Χειροκίνητα</option>
    <option value="scan">Scan Barcode</option>
</select>

<div id="manualBox" style="display:none; flex-direction:column; gap:12px;">
    <input type="text" id="product" placeholder="Προϊόν">
    <input type="number" id="qty" placeholder="Ποσότητα">
</div>

<button id="scanBtn" style="display:none;" onclick="scanProduct()">📷 Scan Προϊόν</button>

<button onclick="submitData()">Καταχώρηση</button>

<a href="welcome.html">← Πίσω</a>

</div>

<script>

const role = localStorage.getItem("role");

if(role !== "employee" && role !== "manager"){
    window.location.href = "welcome.html";
}

function toggleMode(){
    const mode = document.getElementById("mode").value;

    document.getElementById("manualBox").style.display =
        mode === "manual" ? "flex" : "none";

    document.getElementById("scanBtn").style.display =
        mode === "scan" ? "block" : "none";
}

function scanProduct(){
    const code = prompt("Σκάναρε ή βάλε barcode:");

    if(code){
        document.getElementById("product").value = code;
        document.getElementById("qty").value = prompt("Ποσότητα:");
        document.getElementById("manualBox").style.display = "flex";
    }
}

function submitData(){

    const t = document.getElementById("type").value;
    const p = document.getElementById("product").value;
    const q = document.getElementById("qty").value;

    if(!t || !p || !q){
        return alert("Συμπλήρωσε όλα τα πεδία");
    }

    alert("Η ενέργεια καταχωρήθηκε!");
}

</script>

</body>
</html>
