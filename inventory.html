<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Αποθέματα</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

<h2>📊 Διαχείριση Αποθέματος</h2>

<select id="type">
    <option value="">-- Ενέργεια --</option>
    <option value="sale">Πώληση</option>
    <option value="purchase">Αγορά</option>
</select>

<input type="text" id="product" placeholder="Προϊόν">
<input type="number" id="qty" placeholder="Ποσότητα">

<button onclick="submitData()">Καταχώρηση</button>

<a href="welcome.html">← Πίσω</a>

</div>

<script>

const role = localStorage.getItem("role");

if(role !== "employee" && role !== "manager"){
    window.location.href = "welcome.html";
}

function submitData(){

    const t = document.getElementById("type").value;
    const p = document.getElementById("product").value;
    const q = document.getElementById("qty").value;

    if(!t || !p || !q){
        return alert("Συμπλήρωσε όλα τα πεδία");
    }

    alert("Η ενέργεια καταχωρήθηκε!");
}

</script>

</body>
</html>
